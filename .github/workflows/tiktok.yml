name: TikTok Auto Download

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write
  actions: read

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          python3 -m pip install -U "yt-dlp[default]" --break-system-packages

      - name: Install npm dependencies
        run: npm install

      - name: Run downloader
        env:
          TIKTOK_USERNAME: ${{ secrets.TIKTOK_USERNAME }}
          DOWNLOAD_DIR: downloads
        run: npm start

      - name: Commit archive
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/*.txt
          git commit -m "update archive" || echo "No archive changes"
          git push

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-videos
          path: downloads/**/*.mp4
          if-no-files-found: ignore
          retention-days: 3